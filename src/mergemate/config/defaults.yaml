default_agent: coder
default_provider: primary

providers:
  primary:
    api_key_env: PRIMARY_KEY
    model: gpt-5.4
    provider_url: https://api.openai.com/v1/chat/completions
  secondary:
    api_key_env: SECONDARY_KEY
    model: gpt-4.1
    provider_url: https://api.openai.com/v1/chat/completions

telegram:
  bot_token_env: TELEGRAM_TOKEN
  mode: polling

storage:
  workspace_root: workspace
  database_path: .state/runtime.db
  docs_root: docs

learning:
  enabled: true
  max_context_items: 3
  max_result_chars: 1200

tools:
  allow_package_install: false
  allowed_packages: []
  pip_executable: python3

source_control:
  working_directory: repo
  default_platform: github
  enable_git: true
  enable_github: true
  enable_gitlab: true
  git_executable: git
  github_executable: gh
  gitlab_executable: glab

runtime:
  max_concurrent_runs: 2
  status_update_interval_seconds: 5
  default_request_timeout_seconds: 300
  job_lease_seconds: 30
  job_heartbeat_interval_seconds: 10

workflow_control:
  require_confirmation: true
  max_review_iterations: 5

agents:
  planner:
    workflow: planning
  architect:
    workflow: design
  coder:
    workflow: generate_code
    provider_names: [secondary]
  tester:
    workflow: testing
  reviewer:
    workflow: review
  explainer:
    workflow: explain_code

roles:
  planner:
    soul: planner
    workflow: planning
    workers:
      - name: planner-alpha
  architect:
    soul: architect
    workflow: design
    workers:
      - name: architect-alpha
  coder:
    soul: coder
    workflow: generate_code
    workers:
      - name: coder-alpha
        provider_names: [secondary]
  tester:
    soul: tester
    workflow: testing
    workers:
      - name: tester-alpha
  reviewer:
    soul: reviewer
    workflow: review
    workers:
      - name: reviewer-alpha
  chronicler:
    soul: chronicler
    workflow: learning
    workers:
      - name: chronicler-alpha
        provider_names: [primary]
  explainer:
    soul: explainer
    workflow: explain_code
    workers:
      - name: explainer-alpha

logging:
  level: INFO